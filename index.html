<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>money-converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital@0;1&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap"
        rel="stylesheet">
</head>

<body>
    <img id="gif" src="./assts/logo.gif" alt="Logo">

    <main>
        <label>
            Converter <b>de</b>
            <select>
                <option>  R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select>
                <option>  UR$ Dólar Americano</option>
                <option>  € Euro</option>
            </select>
        </label>

        <label>
            Valor
            <input type="number" placeholder=" R$10.000,00" />
        </label>

        <button>Converter</button>

        <section>
            <div class="chrrenc-box">
                <img src="./assts/real.png" alt="Real Brasileiro">
                <p >Real</p>
                <p >R$ 0,00</p>
            </div>
            <img class="arrow-img" src="./assts/seta.png" alt="Seta de Conversão">
            </div class="chrrenc-box">
                <img src="./assts/dolar.png" alt="Dólar Americano">
                <p>Dólar</p>
                <p>UR$ 0,00</p>
            </div>
        </section>

    </main>
</body>

</html>
